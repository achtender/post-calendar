name: Publish Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark release as prerelease
        required: true
        type: boolean
        default: false
      release_notes:
        description: Optional release notes body
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump npm version for this run
        run: npm version "${{ inputs.bump }}" --no-git-tag-version

      - name: Capture computed version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync plugin PHP version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'post-calendar.php';
          const v = process.env.RELEASE_VERSION;

          let src = fs.readFileSync(file, 'utf8');
          src = src.replace(/Version:\s+[0-9]+\.[0-9]+\.[0-9]+/, `Version:     ${v}`);
          src = src.replace(/define\( 'POST_CALENDAR_VERSION', '[^']+' \);/, `define( 'POST_CALENDAR_VERSION', '${v}' );`);
          fs.writeFileSync(file, src);
          NODE

      - name: Validate synchronized versions
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const php = fs.readFileSync('post-calendar.php', 'utf8');
          const header = (php.match(/Version:\s+([0-9]+\.[0-9]+\.[0-9]+)/) || [])[1];
          const constant = (php.match(/POST_CALENDAR_VERSION', '([^']+)'/) || [])[1];
          const expected = process.env.RELEASE_VERSION;

          if (!header || !constant) {
            throw new Error('Could not parse plugin version fields in post-calendar.php');
          }

          if (pkg.version !== expected || header !== expected || constant !== expected) {
            throw new Error(`Version mismatch: package=${pkg.version}, header=${header}, constant=${constant}, expected=${expected}`);
          }
          NODE

      - name: Build release ZIP
        run: npm run build:zip

      - name: Verify release artifact exists
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          ZIP_PATH=".release/post-calendar-${RELEASE_VERSION}.zip"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "Expected release zip not found: $ZIP_PATH"
            exit 1
          fi
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"

      - name: Prepare release body
        env:
          INPUT_NOTES: ${{ inputs.release_notes }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          if [ -n "$INPUT_NOTES" ]; then
            printf '%s\n' "$INPUT_NOTES" > release-notes.md
          else
            printf 'Post Calendar %s\n\nAutomated build artifact from manual workflow dispatch.\n' "$RELEASE_VERSION" > release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Post Calendar ${{ steps.version.outputs.value }}
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          files: ${{ env.ZIP_PATH }}
